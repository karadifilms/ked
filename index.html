<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Kannada Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Ked</h1>
        
        <div class="controls">
            <!-- Auto convert toggle -->
            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="auto-toggle" checked>
                    <span class="slider"></span>
                </label>
                <span id="toggle-label" class="toggle-label">Auto Kannada</span>
            </div>
        </div>
    </div>

    <div class="editor-container">
        <textarea id="editor" placeholder="Start typing in English...&#10;Press SPACE after each word to convert the last word to Kannada (if auto is ON)"></textarea>
        <div id="helpbar">Hello</div>
    </div>

    <div class="footer">
        <p>Type English words on your normal keyboard. Press <strong>SPACE</strong> after each word → it converts to Kannada.</p>
        <p><small>Tip: Use capital letters for retroflex sounds (T = ಟ, D = ಡ, N = ಣ, L = ಳ, S = ಷ). Example: "kannada" → ಕನ್ನಡ</small></p>
        <p><small><strong>Keyboard shortcut:</strong> <kbd>Ctrl</kbd> + <kbd>K</kbd> also toggles Auto Kannada</small></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
