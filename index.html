<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Kannada Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Ked</h1>
        
        <div class="controls">
            <!-- Auto convert toggle -->
            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="auto-toggle" checked>
                    <span class="slider"></span>
                </label>
                <div id="toggle-label-and-helper">
                    <span id="toggle-label" class="toggle-label"></span>
                    <div id="toggle-helper">Ctrl+K to toggle</div>
                </div>
            </div>
        </div>
    </div>

    <div class="editor-container">
        <textarea id="editor" placeholder="Start typing in English...&#10;Press SPACE after each word to convert the last word to Kannada (if auto is ON)"></textarea>
        <div id="helpbar"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
